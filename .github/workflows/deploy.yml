name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build hub (outputs to dist/ at repo root)
      - name: Install hub dependencies
        run: npm install

      - name: Build hub
        run: npm run build

      # Build europe-trip (base: /europe-trip → outputs flat to europe-trip/dist/)
      - name: Install europe-trip dependencies
        working-directory: europe-trip
        run: npm install

      - name: Build europe-trip
        working-directory: europe-trip
        run: npm run build

      - name: Copy europe-trip output into dist/europe-trip/
        run: |
          mkdir -p dist/europe-trip
          cp -r europe-trip/dist/. dist/europe-trip/

      # Build usa-trip (base: /usa-trip → outputs flat to usa-trip/dist/)
      - name: Install usa-trip dependencies
        working-directory: usa-trip
        run: npm install

      - name: Build usa-trip
        working-directory: usa-trip
        run: npm run build

      - name: Copy usa-trip output into dist/usa-trip/
        run: |
          mkdir -p dist/usa-trip
          cp -r usa-trip/dist/. dist/usa-trip/

      # Build texas-trip (base: /texas-trip → outputs flat to texas-trip/dist/)
      - name: Install texas-trip dependencies
        working-directory: texas-trip
        run: npm install

      - name: Build texas-trip
        working-directory: texas-trip
        run: npm run build

      - name: Copy texas-trip output into dist/texas-trip/
        run: |
          mkdir -p dist/texas-trip
          cp -r texas-trip/dist/. dist/texas-trip/

      # Build canada-trip (base: /canada-trip)
      - name: Install canada-trip dependencies
        working-directory: canada-trip
        run: npm install

      - name: Build canada-trip
        working-directory: canada-trip
        run: npm run build

      - name: Copy canada-trip output into dist/canada-trip/
        run: |
          mkdir -p dist/canada-trip
          cp -r canada-trip/dist/. dist/canada-trip/

      # Build seagl-trip (base: /seagl-trip)
      - name: Install seagl-trip dependencies
        working-directory: seagl-trip
        run: npm install

      - name: Build seagl-trip
        working-directory: seagl-trip
        run: npm run build

      - name: Copy seagl-trip output into dist/seagl-trip/
        run: |
          mkdir -p dist/seagl-trip
          cp -r seagl-trip/dist/. dist/seagl-trip/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
