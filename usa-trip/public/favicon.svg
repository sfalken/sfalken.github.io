<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>
  <!-- Diagonal split: red left, blue right -->
  <g clip-path="url(#circle)">
    <polygon points="0,0 32,0 0,32" fill="#B22234"/>
    <polygon points="32,0 32,32 0,32" fill="#3C3B6E"/>
  </g>
  <!-- White M monogram -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">M</text>
</svg>
